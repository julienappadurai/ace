<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ace — Tennis Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e0a;
    --bg2: #111611;
    --bg3: #1a211a;
    --bg4: #202820;
    --border: #2a362a;
    --border2: #344034;
    --green: #4ade80;
    --green2: #22c55e;
    --green3: #16a34a;
    --green-dim: #1a3d2a;
    --red: #f87171;
    --red-dim: #3d1a1a;
    --yellow: #fbbf24;
    --yellow-dim: #3d2e0a;
    --text: #e8f0e8;
    --text2: #9aaa9a;
    --text3: #5a6a5a;
    --card: #131a13;
    --card2: #161e16;
    --accent: #4ade80;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── PIN SCREEN ── */
  #pin-screen {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000;
    flex-direction: column;
    gap: 32px;
  }
  .pin-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 64px;
    letter-spacing: 4px;
    color: var(--green);
    line-height: 1;
  }
  .pin-subtitle { color: var(--text2); font-size: 13px; letter-spacing: 2px; text-transform: uppercase; }
  .pin-dots { display: flex; gap: 12px; }
  .pin-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 2px solid var(--border2);
    background: transparent;
    transition: background 0.2s, border-color 0.2s;
  }
  .pin-dot.filled { background: var(--green); border-color: var(--green); }
  .pin-dot.error { background: var(--red); border-color: var(--red); }
  .pin-keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 220px; }
  .pin-key {
    height: 58px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 20px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .pin-key:hover { background: var(--bg4); }
  .pin-key:active { transform: scale(0.95); background: var(--green-dim); }
  .pin-key.del { font-size: 16px; color: var(--text2); }
  .pin-error { color: var(--red); font-size: 12px; min-height: 18px; text-align: center; }

  /* ── SETUP ── */
  #setup-screen {
    position: fixed; inset: 0;
    background: var(--bg);
    display: none; align-items: center; justify-content: center;
    z-index: 999;
    flex-direction: column;
    gap: 24px;
    padding: 24px;
  }
  .setup-title { font-family: 'Bebas Neue', sans-serif; font-size: 48px; color: var(--green); letter-spacing: 3px; }
  .setup-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 16px; }
  .setup-label { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--text2); margin-bottom: 4px; }
  .setup-input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .setup-input:focus { border-color: var(--green); }
  .btn-primary {
    background: var(--green);
    color: #0a0e0a;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 14px;
    padding: 12px 20px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    letter-spacing: 0.5px;
  }
  .btn-primary:hover { background: var(--green2); }
  .btn-primary:active { transform: scale(0.98); }

  /* ── MAIN APP ── */
  #app { display: none; flex-direction: column; min-height: 100vh; }

  /* ── HEADER ── */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px;
    height: 60px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky; top: 0; z-index: 100;
  }
  .header-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    color: var(--green);
  }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .sync-indicator { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text3); }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); }
  .sync-dot.synced { background: var(--green); }
  .sync-dot.syncing { background: var(--yellow); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── NAV ── */
  .nav {
    display: flex; gap: 4px;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }
  .nav-btn {
    background: none;
    border: 1px solid transparent;
    border-radius: var(--radius-sm);
    color: var(--text2);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 7px 16px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    letter-spacing: 0.3px;
  }
  .nav-btn:hover { color: var(--text); background: var(--bg3); }
  .nav-btn.active { color: var(--green); background: var(--green-dim); border-color: var(--border2); }

  /* ── CONTENT ── */
  .content { padding: 24px; max-width: 900px; margin: 0 auto; width: 100%; flex: 1; }

  /* ── TABS ── */
  .tab { display: none; }
  .tab.active { display: block; }

  /* ── CARDS ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }
  .card-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text3);
    margin-bottom: 12px;
  }

  /* ── STAT GRID ── */
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--text3); }
  .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 38px; color: var(--text); line-height: 1; }
  .stat-value.green { color: var(--green); }
  .stat-value.red { color: var(--red); }
  .stat-sub { font-size: 12px; color: var(--text2); }

  /* ── CHART ── */
  .chart-wrap { width: 100%; overflow-x: auto; margin-bottom: 24px; }
  canvas { display: block; }

  /* ── MATCH LIST ── */
  .match-item {
    display: flex; align-items: center; gap: 16px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
    cursor: default;
  }
  .match-item:last-child { border-bottom: none; }
  .match-item:hover { background: var(--bg3); }
  .match-result-badge {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 12px; flex-shrink: 0;
  }
  .match-result-badge.win { background: var(--green-dim); color: var(--green); }
  .match-result-badge.loss { background: var(--red-dim); color: var(--red); }
  .match-info { flex: 1; min-width: 0; }
  .match-opponent { font-weight: 600; font-size: 14px; }
  .match-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .match-score { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text2); text-align: right; }
  .match-score .set { display: inline-block; margin-left: 6px; }
  .match-score .set.won { color: var(--green); }
  .match-score .set.lost { color: var(--red); }

  /* ── FORMS ── */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1/-1; }
  .form-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text2); }
  .form-input, .form-select {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  .form-input:focus, .form-select:focus { border-color: var(--green); }
  .form-select option { background: var(--bg3); }

  /* ── SETS BUILDER ── */
  .sets-builder { display: flex; flex-direction: column; gap: 10px; }
  .set-row { display: flex; align-items: center; gap: 10px; }
  .set-row-label { font-size: 12px; color: var(--text2); width: 40px; flex-shrink: 0; }
  .set-score-input {
    width: 56px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    padding: 8px;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
  }
  .set-score-input:focus { border-color: var(--green); }
  .set-vs { color: var(--text3); font-size: 12px; }
  .btn-add-set, .btn-rm-set {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text2);
    font-size: 18px;
    width: 32px; height: 32px;
    cursor: pointer;
    transition: background 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-add-set:hover { background: var(--green-dim); color: var(--green); border-color: var(--green); }
  .btn-rm-set:hover { background: var(--red-dim); color: var(--red); border-color: var(--red); }

  /* ── BUTTONS ── */
  .btn-ghost {
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text2);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 8px 14px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-ghost:hover { border-color: var(--border2); color: var(--text); background: var(--bg3); }
  .btn-danger {
    background: none;
    border: 1px solid var(--red-dim);
    border-radius: var(--radius-sm);
    color: var(--red);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 8px 14px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-danger:hover { background: var(--red-dim); }

  /* ── SECTION HEADER ── */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: var(--text); }

  /* ── OPPONENT TABLE ── */
  .opp-table { width: 100%; border-collapse: collapse; }
  .opp-table th {
    text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: 2px;
    color: var(--text3); padding: 8px 12px; border-bottom: 1px solid var(--border);
  }
  .opp-table td { padding: 12px 12px; border-bottom: 1px solid var(--border); font-size: 14px; }
  .opp-table tr:last-child td { border-bottom: none; }
  .opp-table tr:hover td { background: var(--bg3); }
  .win-rate-bar { height: 4px; background: var(--bg3); border-radius: 2px; margin-top: 4px; overflow: hidden; }
  .win-rate-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.5s; }

  /* ── COACH TAB ── */
  .coach-layout { display: flex; flex-direction: column; height: calc(100vh - 200px); min-height: 400px; }
  .coach-messages {
    flex: 1; overflow-y: auto; padding: 16px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius) var(--radius) 0 0;
    display: flex; flex-direction: column; gap: 16px;
  }
  .msg { display: flex; gap: 12px; max-width: 85%; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg-avatar {
    width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700;
  }
  .msg.ace .msg-avatar { background: var(--green-dim); color: var(--green); }
  .msg.user .msg-avatar { background: var(--bg4); color: var(--text2); }
  .msg-bubble {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 16px;
    font-size: 14px; line-height: 1.6; color: var(--text);
  }
  .msg.ace .msg-bubble { border-color: var(--border2); }
  .msg.user .msg-bubble { background: var(--green-dim); border-color: var(--green3); }
  .msg-time { font-size: 11px; color: var(--text3); margin-top: 4px; }
  .coach-input-area {
    background: var(--bg3); border: 1px solid var(--border); border-top: none;
    border-radius: 0 0 var(--radius) var(--radius);
    padding: 12px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .coach-input-row { display: flex; gap: 8px; align-items: flex-end; }
  .coach-textarea {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    resize: none;
    min-height: 42px; max-height: 120px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }
  .coach-textarea:focus { border-color: var(--green); }
  .coach-send {
    background: var(--green);
    border: none; border-radius: var(--radius-sm);
    color: #0a0e0a; font-size: 18px;
    width: 42px; height: 42px; flex-shrink: 0;
    cursor: pointer; transition: background 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .coach-send:hover { background: var(--green2); }
  .coach-send:disabled { background: var(--bg4); color: var(--text3); cursor: not-allowed; }
  .clip-upload-row { display: flex; align-items: center; gap: 8px; }
  .clip-label {
    display: flex; align-items: center; gap: 6px;
    background: var(--bg4); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 6px 12px;
    cursor: pointer; font-size: 12px; color: var(--text2);
    transition: all 0.15s;
  }
  .clip-label:hover { border-color: var(--green); color: var(--green); }
  #clip-input { display: none; }
  .clip-name { font-size: 12px; color: var(--green); }
  .typing-indicator { display: flex; gap: 4px; padding: 8px 0; }
  .typing-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); animation: typing 1.2s infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: none; align-items: center; justify-content: center;
    z-index: 500; padding: 24px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2); border: 1px solid var(--border2);
    border-radius: var(--radius); padding: 28px;
    width: 100%; max-width: 480px;
    max-height: 90vh; overflow-y: auto;
    display: flex; flex-direction: column; gap: 20px;
  }
  .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px; }
  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px; }

  /* ── EMPTY STATE ── */
  .empty-state { text-align: center; padding: 48px 24px; color: var(--text3); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px);
    background: var(--bg4); border: 1px solid var(--border2);
    border-radius: var(--radius-sm); padding: 10px 20px;
    font-size: 13px; color: var(--text);
    transition: transform 0.3s ease;
    z-index: 9999; white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ── RECENT MATCHES (dashboard) ── */
  .recent-list { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }

  /* ── SURFACE BADGE ── */
  .surface-badge {
    font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
    padding: 2px 7px; border-radius: 20px; font-weight: 600;
  }
  .surface-badge.hard { background: #1a2a3d; color: #60a5fa; }
  .surface-badge.clay { background: #3d2010; color: #fb923c; }
  .surface-badge.grass { background: var(--green-dim); color: var(--green); }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .content { padding: 16px; }
    .form-grid { grid-template-columns: 1fr; }
    .stat-grid { grid-template-columns: 1fr 1fr; }
    .header { padding: 0 16px; }
    .nav { padding: 10px 16px; }
  }
</style>
</head>
<body>

<!-- PIN SCREEN -->
<div id="pin-screen">
  <div class="pin-logo">ACE</div>
  <div class="pin-subtitle">Tennis Tracker</div>
  <div class="pin-dots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
  </div>
  <div class="pin-keypad" id="pin-keypad">
    <button class="pin-key" data-k="1">1</button>
    <button class="pin-key" data-k="2">2</button>
    <button class="pin-key" data-k="3">3</button>
    <button class="pin-key" data-k="4">4</button>
    <button class="pin-key" data-k="5">5</button>
    <button class="pin-key" data-k="6">6</button>
    <button class="pin-key" data-k="7">7</button>
    <button class="pin-key" data-k="8">8</button>
    <button class="pin-key" data-k="9">9</button>
    <button class="pin-key del" data-k="del">⌫</button>
    <button class="pin-key" data-k="0">0</button>
    <button class="pin-key del" data-k="clr">✕</button>
  </div>
  <div class="pin-error" id="pin-error"></div>
</div>

<!-- SETUP SCREEN -->
<div id="setup-screen">
  <div class="setup-title">ACE</div>
  <p style="color:var(--text2);font-size:13px;">Let's set up your tracker</p>
  <div class="setup-card">
    <div>
      <div class="setup-label">Your name</div>
      <input class="setup-input" id="setup-name" placeholder="e.g. Julien" maxlength="30">
    </div>
    <div>
      <div class="setup-label">Set a 4-digit PIN</div>
      <input class="setup-input" id="setup-pin" type="password" inputmode="numeric" maxlength="4" placeholder="••••">
    </div>
    <button class="btn-primary" onclick="completeSetup()">Get Started →</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <header class="header">
    <div class="header-logo">ACE</div>
    <div class="header-right">
      <div class="sync-indicator">
        <div class="sync-dot" id="sync-dot"></div>
        <span id="sync-label">Offline</span>
      </div>
      <button class="btn-ghost" id="gauth-btn" onclick="handleGoogleAuth()" style="font-size:12px;padding:6px 12px;">Connect Drive</button>
    </div>
  </header>
  <nav class="nav">
    <button class="nav-btn active" onclick="switchTab('dashboard')">Dashboard</button>
    <button class="nav-btn" onclick="switchTab('matches')">Matches</button>
    <button class="nav-btn" onclick="switchTab('opponents')">Opponents</button>
    <button class="nav-btn" onclick="switchTab('coach')">🎾 Ace Coach</button>
  </nav>
  <div class="content">

    <!-- DASHBOARD -->
    <div class="tab active" id="tab-dashboard">
      <div class="stat-grid" id="dash-stats"></div>
      <div class="chart-wrap card" style="margin-bottom:24px;padding:20px;">
        <div class="card-title">Last 12 months — matches & win rate</div>
        <canvas id="main-chart" height="160"></canvas>
      </div>
      <div class="section-header">
        <div class="section-title">Recent Matches</div>
      </div>

function setSyncStatus(state, label) {

async function syncDrive() {
  try {
    // Find or create folder
    let folderId = await findOrCreateFolder(FOLDER);
    // Find file
    const res = await gapi.client.drive.files.list({
      q: `name='${FILE_NAME}' and '${folderId}' in parents and trashed=false`,
      fields: 'files(id,modifiedTime)'
    });
    if (res.result.files.length > 0) {
      driveFileId = res.result.files[0].id;
      // Download and merge
      const dl = await fetch(`https://www.googleapis.com/drive/v3/files/${driveFileId}?alt=media`,
        { headers: { Authorization: `Bearer ${gapi.auth.getToken().access_token}` } });
      const remote = await dl.json();
      // Simple merge: remote wins if newer
      D = remote;
      D.settings = D.settings || { name: D.settings?.name || '', pin: D.settings?.pin || '' };
      D.matches = D.matches || [];
      D.opponents = D.opponents || [];
      D.coach = D.coach || { messages: [] };
      saveLocal();
      renderAll();
      initCoachChat();
    } else {
      // Upload new file
      driveFileId = await uploadDrive(folderId);
    }
    setSyncStatus('synced', 'Synced');
  } catch(e) {
    console.error(e);
    setSyncStatus('', 'Sync failed');
  }
}
async function findOrCreateFolder(name) {
  const res = await gapi.client.drive.files.list({
    q: `name='${name}' and mimeType='application/vnd.google-apps.folder' and trashed=false`,
    fields: 'files(id)'
  });
  if (res.result.files.length > 0) return res.result.files[0].id;
  const cr = await gapi.client.drive.files.create({
    resource: { name, mimeType: 'application/vnd.google-apps.folder' },
    fields: 'id'
  });
  return cr.result.id;
}
async function uploadDrive(folderId) {
  const body = JSON.stringify(D);
  const meta = { name: FILE_NAME, parents: [folderId], mimeType: 'application/json' };
  const boundary = 'ace_boundary';
  const multipart = `--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(meta)}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${body}\r\n--${boundary}--`;
  const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id', {
    method: 'POST',
    headers: {
      Authorization: `Bearer ${gapi.auth.getToken().access_token}`,
      'Content-Type': `multipart/related; boundary=${boundary}`
    }, body: multipart
  });
  const data = await res.json();
  return data.id;
}
async function saveDrive() {
  if (!isSignedIn || !gapiReady) return;
  setSyncStatus('syncing', 'Saving…');

    const body = JSON.stringify(D);

        method: 'PATCH',
        headers: {
          Authorization: `Bearer ${gapi.auth.getToken().access_token}`,
          'Content-Type': 'application/json'
        }, body
      });
    }
    setSyncStatus('synced', 'Saved');
  } catch(e) {
    setSyncStatus('', 'Save failed');
  }
}

function renderDashboard() {

    </div>

  `;

  // Recent matches

  el.innerHTML = recent.map(m => matchItemHTML(m)).join('');
}

function computeStats() {
  const now = new Date();
  const thisYear = now.getFullYear().toString();
  let wins=0,losses=0,setsWon=0,setsTotal=0,thisYearCount=0;
  const monthly = {};
  // Prepare last 12 months
  for (let i=11;i>=0;i--) {
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    const key = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    monthly[key] = { played:0, wins:0 };
  }
  D.matches.forEach(m => {
    if (m.result === 'win') wins++; else losses++;
    (m.score||[]).forEach(s => {
      if (s.me > s.them) setsWon++; else if (s.them > s.me) {}
      setsTotal++;
    });
    if (m.date?.startsWith(thisYear)) thisYearCount++;
    const mk = m.date?.slice(0,7);
    if (mk && monthly[mk]) { monthly[mk].played++; if(m.result==='win') monthly[mk].wins++; }
  });
  // Streak
  const sorted = [...D.matches].sort((a,b) => b.date.localeCompare(a.date));
  let winStreak=0,loseStreak=0;
  for (const m of sorted) {
    if (m.result==='win') { if(loseStreak===0) winStreak++; else break; }
    else { if(winStreak===0) loseStreak++; else break; }
  }
  return { total: D.matches.length, wins, losses, setsWon, setsTotal, thisYear: thisYearCount, monthly, winStreak, loseStreak };
}

function drawChart(monthly) {
  const canvas = document.getElementById('main-chart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const keys = Object.keys(monthly);
  const W = canvas.parentElement.clientWidth - 40;
  canvas.width = Math.max(W, 300);
  canvas.height = 160;
  const cw = canvas.width, ch = canvas.height;
  const pad = { top:20, right:10, bottom:40, left:30 };
  const gw = cw - pad.left - pad.right;
  const gh = ch - pad.top - pad.bottom;
  ctx.clearRect(0,0,cw,ch);
  const maxPlayed = Math.max(...keys.map(k => monthly[k].played), 1);
  const barW = gw / keys.length * 0.5;
  const barSpacing = gw / keys.length;
  // Gridlines
  ctx.strokeStyle = 'rgba(42,54,42,0.6)'; ctx.lineWidth = 1;
  for (let i=0;i<=4;i++) {
    const y = pad.top + gh - (i/4)*gh;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left+gw, y); ctx.stroke();
  }
  // Bars
  keys.forEach((k, i) => {
    const x = pad.left + i*barSpacing + barSpacing/2 - barW/2;
    const played = monthly[k].played;
    const barH = played ? (played/maxPlayed)*gh : 0;
    const y = pad.top + gh - barH;
    // Win portion
    const winH = played ? (monthly[k].wins/maxPlayed)*gh : 0;
    const loseH = barH - winH;
    if (barH > 0) {
      ctx.fillStyle = '#1a3d2a';
      ctx.beginPath(); ctx.roundRect(x, y, barW, barH, [3,3,0,0]); ctx.fill();
      ctx.fillStyle = '#4ade80';
      ctx.beginPath(); ctx.roundRect(x, y+loseH, barW, winH, [3,3,0,0]); ctx.fill();
    }
    // Label
    ctx.fillStyle = '#5a6a5a'; ctx.font = '10px DM Sans'; ctx.textAlign = 'center';
    const parts = k.split('-');
    const mon = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(parts[1])-1];
    ctx.fillText(mon, pad.left + i*barSpacing + barSpacing/2, ch - 4);
    if (played > 0) {
      ctx.fillStyle = '#9aaa9a'; ctx.font = '10px DM Mono';
      ctx.fillText(played, pad.left + i*barSpacing + barSpacing/2, y-5);
    }
  });
  // Win rate line
  ctx.strokeStyle = 'rgba(74,222,128,0.5)'; ctx.lineWidth = 2; ctx.setLineDash([3,3]);
  ctx.beginPath();
  let first = true;
  keys.forEach((k, i) => {
    if (!monthly[k].played) return;
    const wr = monthly[k].wins/monthly[k].played;
    const x = pad.left + i*barSpacing + barSpacing/2;
    const y = pad.top + gh - wr*gh;
    if (first) { ctx.moveTo(x,y); first=false; } else ctx.lineTo(x,y);
  });
  ctx.stroke(); ctx.setLineDash([]);
}

    <span class="set-vs">—</span>
    <input class="set-score-input" type="number" min="0" max="99" value="${them}" placeholder="0">
    <button class="btn-rm-set" onclick="removeSetRow(this)">−</button>
  `;
  builder.appendChild(div);
  renumberSets();
}
function removeSetRow(btn) {
  const builder = document.getElementById('sets-builder');
  if (builder.querySelectorAll('.set-row').length <= 1) { showToast('Need at least 1 set'); return; }
  btn.closest('.set-row').remove();
  renumberSets();
}
function renumberSets() {
  document.querySelectorAll('.set-row').forEach((r,i) => {
    r.querySelector('.set-row-label').textContent = `Set ${i+1}`;
  });
}
function collectSets() {
  const sets = [];
  document.querySelectorAll('.set-row').forEach(r => {
    const inputs = r.querySelectorAll('.set-score-input');
    const me = parseInt(inputs[0].value) || 0;
    const them = parseInt(inputs[1].value) || 0;
    sets.push({ me, them });
  });
  return sets;
}
function determineResult(sets) {
  let myWins=0, theirWins=0;
  sets.forEach(s => { if(s.me > s.them) myWins++; else theirWins++; });
  return myWins > theirWins ? 'win' : 'loss';
}
function saveMatch() {
  const date = document.getElementById('m-date').value;
  const opponent = document.getElementById('m-opponent').value;
  const surface = document.getElementById('m-surface').value;
  const location = document.getElementById('m-location').value.trim();
  if (!date) { showToast('Please enter a date'); return; }
  if (!opponent) { showToast('Please select an opponent'); return; }
  const score = collectSets();
  const result = determineResult(score);
  if (editMatchId) {
    const m = D.matches.find(x => x.id === editMatchId);
    Object.assign(m, { date, opponent, surface, location, score, result });
  } else {
    D.matches.push({ id: uid(), date, opponent, surface, location, score, result });
  }
  saveLocal(); saveDrive();
  closeModal('modal-match');
  renderAll();
  showToast(editMatchId ? 'Match updated' : 'Match logged ✓');
}
function deleteMatch(id) {
  if (!confirm('Delete this match?')) return;
  D.matches = D.matches.filter(m => m.id !== id);
  saveLocal(); saveDrive();
  renderAll();
  showToast('Match deleted');
}

// ═══════════════════════════════════════════════
// OPPONENTS
// ═══════════════════════════════════════════════
function renderOpponents() {
  const tbody = document.getElementById('opp-tbody');
  if (!D.opponents.length) {
    tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state"><div class="empty-icon">👤</div><div class="empty-text">No opponents yet.</div></div></td></tr>';
    return;
  }
  tbody.innerHTML = D.opponents.map(o => {
    const matches = D.matches.filter(m => m.opponent === o.id);
    const wins = matches.filter(m => m.result === 'win').length;
    const losses = matches.length - wins;
    const wr = matches.length ? Math.round(wins/matches.length*100) : 0;
    return `<tr>
      <td><strong>${o.name}</strong></td>
      <td>${matches.length}</td>
      <td><span style="color:var(--green)">${wins}W</span> <span style="color:var(--text3)">/</span> <span style="color:var(--red)">${losses}L</span></td>
      <td>
        <div>${wr}%</div>
        <div class="win-rate-bar"><div class="win-rate-fill" style="width:${wr}%"></div></div>
      </td>
      <td>
        <button class="btn-danger" style="font-size:11px;padding:4px 8px;" onclick="deleteOpponent('${o.id}')">Del</button>
      </td>
    </tr>`;
  }).join('');
}
function openAddOpponent() {
  document.getElementById('opp-name-input').value = '';
  document.getElementById('modal-opponent').classList.add('open');
}
function saveOpponent() {
  const name = document.getElementById('opp-name-input').value.trim();
  if (!name) { showToast('Enter a name'); return; }
  if (D.opponents.find(o => o.name.toLowerCase() === name.toLowerCase())) { showToast('Opponent already exists'); return; }
  D.opponents.push({ id: uid(), name });
  saveLocal(); saveDrive();
  closeModal('modal-opponent');
  renderOpponents();
  showToast('Opponent added ✓');
}
function deleteOpponent(id) {
  if (D.matches.find(m => m.opponent === id)) {
    if (!confirm('This opponent has match history. Delete anyway?')) return;
  }
  D.opponents = D.opponents.filter(o => o.id !== id);
  saveLocal(); saveDrive();
  renderOpponents();
  showToast('Opponent deleted');
}

// ═══════════════════════════════════════════════
// COACH (ACE)
// ═══════════════════════════════════════════════
function initCoachChat() {
  const el = document.getElementById('coach-messages');
  el.innerHTML = '';
  if (!D.coach.messages.length) {
    const name = D.settings.name || 'there';
    appendCoachMsg('ace', `Hey ${name}! I'm Ace, your personal tennis coach 🎾\n\nYou can ask me anything about your game — technique, strategy, fitness, or mental game. You can also upload a short video clip and I'll give you feedback on what I see.\n\nWhat are we working on today?`, new Date().toISOString());
  } else {
    D.coach.messages.forEach(m => appendCoachMsg(m.role, m.content, m.timestamp));
  }
  scrollCoachToBottom();
}

function appendCoachMsg(role, content, timestamp) {
  const el = document.getElementById('coach-messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const avatar = role === 'ace' ? '🎾' : (D.settings.name ? D.settings.name[0].toUpperCase() : 'U');
  const time = timestamp ? new Date(timestamp).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '';
  div.innerHTML = `
    <div class="msg-avatar">${avatar}</div>
    <div>
      <div class="msg-bubble">${escapeHtml(content).replace(/\n/g,'<br>')}</div>
      <div class="msg-time">${time}</div>
    </div>
  `;
  el.appendChild(div);
  scrollCoachToBottom();
}

function scrollCoachToBottom() {
  const el = document.getElementById('coach-messages');
  if (el) el.scrollTop = el.scrollHeight;
}

function handleClipSelected(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 50 * 1024 * 1024) { showToast('Clip too large (max 50MB)'); input.value=''; return; }
  pendingClipFile = file;
  document.getElementById('clip-name').textContent = file.name;
  document.getElementById('clip-clear').style.display = 'block';
  // Read as base64
  const reader = new FileReader();
  reader.onload = e => { pendingClipBase64 = e.target.result.split(',')[1]; };
  reader.readAsDataURL(file);
}

function clearClip() {
  pendingClipFile = null;
  pendingClipBase64 = null;
  document.getElementById('clip-input').value = '';
  document.getElementById('clip-name').textContent = '';
  document.getElementById('clip-clear').style.display = 'none';
}

function coachKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendCoachMessage(); }
}

function autoResize(ta) {
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
}

async function sendCoachMessage() {
  const ta = document.getElementById('coach-input');
  const text = ta.value.trim();
  const hasClip = !!pendingClipBase64;
  if (!text && !hasClip) return;
  const btn = document.getElementById('coach-send-btn');
  btn.disabled = true;
  const userMsg = text || (hasClip ? '(Video clip attached)' : '');
  const ts = new Date().toISOString();
  // Show user message
  appendCoachMsg('user', userMsg + (hasClip ? '\n📎 ' + (pendingClipFile?.name||'clip') : ''), ts);
  // Save to D.coach
  if (!D.coach.messages.length) {
    // first real message
  }
  D.coach.messages.push({ role: 'user', content: userMsg + (hasClip ? '\n[video clip: '+pendingClipFile?.name+']' : ''), timestamp: ts });
  ta.value = ''; ta.style.height = 'auto';
  const clipFile = pendingClipFile;
  const clipB64 = pendingClipBase64;
  clearClip();
  // Show typing
  const typing = showTyping();
  // Build history for API
  const stats = computeStats();
  const systemPrompt = buildCoachSystem(stats);
  const messages = buildCoachMessages(userMsg, clipB64, clipFile);
  try {
    const reply = await callAnthropicCoach(systemPrompt, messages);
    removeTyping(typing);
    const replyTs = new Date().toISOString();
    appendCoachMsg('ace', reply, replyTs);
    D.coach.messages.push({ role: 'assistant', content: reply, timestamp: replyTs });
    saveLocal(); saveDrive();
  } catch(e) {
    removeTyping(typing);
    appendCoachMsg('ace', 'Sorry, I had trouble connecting. Please check your network and try again.', new Date().toISOString());
  }
  btn.disabled = false;
}

function buildCoachSystem(stats) {
  const name = D.settings.name || 'the player';
  const recentMatches = [...D.matches].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5).map(m => {
    const opp = D.opponents.find(o=>o.id===m.opponent);
    const scoreStr = (m.score||[]).map(s=>`${s.me}-${s.them}`).join(', ');
    return `${m.date}: ${m.result==='win'?'Win':'Loss'} vs ${opp?.name||'Unknown'} (${scoreStr}) on ${m.surface}`;
  }).join('\n');
  return `You are Ace, an expert tennis coach and analyst. You are coaching ${name}.

Player stats:
- Total matches: ${stats.total}
- Win rate: ${stats.total ? Math.round(stats.wins/stats.total*100) : 0}%
- Sets won: ${stats.setsWon}/${stats.setsTotal}
- Current streak: ${stats.winStreak > 0 ? stats.winStreak+'W' : stats.loseStreak+'L'}

Recent matches:
${recentMatches || 'None yet'}

Your role:
- Give practical, actionable coaching advice
- Analyse video clips when provided and give specific feedback on technique, positioning, footwork
- Be encouraging but honest
- Remember the player's history across this conversation
- Ask clarifying questions when needed
- Keep responses concise but thorough

Respond in plain text, no markdown formatting.`;
}

function buildCoachMessages(text, clipB64, clipFile) {
  // Build from history + new message
  const history = D.coach.messages.slice(0, -1); // exclude the one we just pushed
  const msgs = [];
  history.forEach(m => {
    msgs.push({ role: m.role === 'ace' ? 'assistant' : 'user', content: m.content });
  });
  // New user message
  if (clipB64 && clipFile) {
    msgs.push({
      role: 'user',
      content: [
        { type: 'text', text: text || 'Please analyse this tennis clip and give me feedback.' },
        { type: 'image', source: { type: 'base64', media_type: clipFile.type.startsWith('video') ? 'image/jpeg' : clipFile.type, data: clipB64 } }
      ]
    });
  } else {
    msgs.push({ role: 'user', content: text });
  }
  return msgs;
}

async function callAnthropicCoach(system, messages) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system,
      messages
    })
  });
  if (!res.ok) throw new Error('API error ' + res.status);
  const data = await res.json();
  return data.content?.map(c => c.text || '').join('') || 'No response';
}

function showTyping() {
  const el = document.getElementById('coach-messages');
  const div = document.createElement('div');
  div.className = 'msg ace'; div.id = 'typing-msg';
  div.innerHTML = `<div class="msg-avatar">🎾</div><div class="msg-bubble"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
  el.appendChild(div);
  scrollCoachToBottom();
  return div;
}
function removeTyping(el) { if (el && el.parentNode) el.parentNode.removeChild(el); }

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showToast(msg, duration=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// Close modal on overlay click
document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
});

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
loadLocal();
// If no pin set, show setup after pin screen interaction
// Otherwise show pin screen (already visible)
</script>
